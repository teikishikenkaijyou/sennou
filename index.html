<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>洗脳文字避けゲーム - 精密回避 -</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; 
               font-family: "Hiragino Kaku Gothic ProN", "Hiragino Kaku Gothic Pro", "メイリオ", sans-serif; }
        canvas { display: block; cursor: none; }
        #ui { position: absolute; top: 10px; left: 10px; font-size: 18px; color: #ff0000; pointer-events: none; z-index: 10; font-weight: bold; }
    </style>
</head>
<body>
<div id="ui">生存時間: <span id="score">0</span>秒</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameState = 'playing';
let startTime = Date.now();
let frameCount = 0;

const kakuGothic = '"Hiragino Kaku Gothic ProN", "Hiragino Kaku Gothic Pro", "メイリオ", sans-serif';
const centerText = "全てあなたの所為です。";
const targetBox = { w: 320, h: 45 }; 

const enemyChars = "一心不乱描出妙笛音心地好感瞬間聴神経焼焦戯言避様針傷跡隠病心慰様視神経麻痺虚無思想群喜悲長年時経屍感情求全所為海中彷徨続見一摘光甘全掻集足元及像突然呼吸絶鋼器壊前向風吹漂糸洗脳狂路線変動予想裏切意志持始機械掴放繰返彼今迄演技続消記憶隅駆巡得体知偶像彫心鏤骨末抱刃向裏付言葉紡奮立偶像楽様針向音色奏四面楚歌生壊既枯尽屍優美求全所為海中彷徨続見一摘光甘全掻集足元及像突然呼吸絶鋼器壊前向風吹漂糸洗脳狂路線変動予想裏切意志持始機械掴放繰返彼今迄演技続消形骸化愛他力本願怠惰".split("");

let enemies = [];
const mouse = { x: canvas.width / 2, y: canvas.height / 2 };

window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener('click', () => {
    if (gameState === 'gameover') resetGame();
});

class Enemy {
    constructor(difficultyLevel, type) {
        this.type = type; 
        
        if (this.type === 'kanji') {
            const side = Math.floor(Math.random() * 4);
            if (side === 0) { this.x = Math.random() * canvas.width; this.y = -60; }
            else if (side === 1) { this.x = canvas.width + 60; this.y = Math.random() * canvas.height; }
            else if (side === 2) { this.x = Math.random() * canvas.width; this.y = canvas.height + 60; }
            else { this.x = -60; this.y = Math.random() * canvas.height; }

            this.char = enemyChars[Math.floor(Math.random() * enemyChars.length)];
            this.fontSize = (Math.random() * 30 + 24) + (difficultyLevel * 0.4);
            this.radius = this.fontSize * 0.42;
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * (0.08 + difficultyLevel * 0.005);
            
            const speed = (1.5 + Math.random() * 2) + (difficultyLevel * 0.15);
            const angle = Math.atan2(canvas.height / 2 - this.y, canvas.width / 2 - this.x);
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
        } else {
            // ドット：左右から反対側へ平行移動
            const fromLeft = Math.random() > 0.5;
            this.x = fromLeft ? -30 : canvas.width + 30;
            this.y = Math.random() * canvas.height;
            this.radius = 5;
            this.vx = fromLeft ? 1.2 : -1.2;
            this.vy = 0; 
        }
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.type === 'kanji') this.rotation += this.rotationSpeed;
    }

    draw() {
        if (this.type === 'kanji') {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.font = `600 ${this.fontSize}px ${kakuGothic}`;
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.char, 0, 0);
            ctx.restore();
        } else {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.fill();
            ctx.closePath();
        }
    }
}

function resetGame() {
    enemies = [];
    gameState = 'playing';
    startTime = Date.now();
    frameCount = 0;
}

function drawBackground() {
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const maxRadius = Math.max(canvas.width, canvas.height);
    const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxRadius);
    gradient.addColorStop(0, '#1a0033'); 
    gradient.addColorStop(0.6, '#050010');
    gradient.addColorStop(1, '#000000');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function gameLoop() {
    drawBackground();
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    if (gameState === 'playing') {
        frameCount++;
        const elapsedMS = Date.now() - startTime;
        const elapsedSec = elapsedMS / 1000;
        scoreElement.innerText = elapsedSec.toFixed(1);

        // 漢字の生成
        const kanjiInterval = Math.max(5, Math.floor(25 - (elapsedSec * 0.8)));
        if (frameCount % kanjiInterval === 0) {
            enemies.push(new Enemy(elapsedSec, 'kanji'));
        }

        // ドットの生成：さらに頻度を半分に (24 -> 48)
        if (frameCount % 48 === 0) {
            enemies.push(new Enemy(elapsedSec, 'dot'));
        }

        // 中心の文字
        ctx.font = `bold 28px ${kakuGothic}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        if (elapsedMS < 1000) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            ctx.fillText(centerText, centerX, centerY);
        } else {
            ctx.fillStyle = "white";
            ctx.fillText(centerText, centerX, centerY);
            
            if (mouse.x > centerX - targetBox.w/2 && mouse.x < centerX + targetBox.w/2 &&
                mouse.y > centerY - targetBox.h/2 && mouse.y < centerY + targetBox.h/2) {
                gameState = 'gameover';
            }
        }

        // 自機
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, 6, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.strokeStyle = "#ff0000";
        ctx.stroke();

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            e.update();
            e.draw();

            const dist = Math.sqrt((e.x - mouse.x)**2 + (e.y - mouse.y)**2);
            if (dist < e.radius + 5) gameState = 'gameover';

            if (e.x < -300 || e.x > canvas.width + 300 || e.y < -300 || e.y > canvas.height + 300) {
                enemies.splice(i, 1);
            }
        }
    } else {
        ctx.fillStyle = "rgba(60, 0, 0, 0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = `bold 40px ${kakuGothic}`;
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.fillText("思考が停止しました", centerX, centerY);
        ctx.font = `20px ${kakuGothic}`;
        ctx.fillText(`RECORD: ${scoreElement.innerText} SEC`, centerX, centerY + 60);
        ctx.fillText("CLICK TO RESTART", centerX, centerY + 120);
    }
    requestAnimationFrame(gameLoop);
}
gameLoop();
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
