<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>洗脳</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; 
               font-family: "Hiragino Kaku Gothic ProN", "Hiragino Kaku Gothic Pro", "メイリオ", sans-serif; }
        canvas { display: block; background-color: #000; } 
        #ui { position: absolute; top: 10px; left: 10px; font-size: 18px; color: #ff0000; pointer-events: none; z-index: 10; font-weight: bold; }
        
        /* ボタンコンテナのスタイル */
        #btn-container {
            position: absolute;
            top: 75%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none; /* ゲームオーバー時のみ表示 */
            gap: 20px;
            z-index: 20;
            align-items: center;
        }

        .action-btn {
            padding: 12px 24px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        #post-btn { background-color: #1da1f2; }
        #post-btn:hover { background-color: #0d8bd9; transform: scale(1.1); }

        #yt-btn { background-color: #ff0000; }
        #yt-btn:hover { background-color: #cc0000; transform: scale(1.1); }
        #yt-btn img { width: 24px; height: auto; margin-right: 8px; }
    </style>
</head>
<body>
<div id="ui">生存時間: <span id="score">0</span>秒</div>

<div id="btn-container">
    <button id="post-btn" class="action-btn">𝕏 にポストする</button>
    <a href="https://youtu.be/QjcmIFyqixs" target="_blank" id="yt-btn" class="action-btn">
        <img src="https://www.youtube.com/s/desktop/28ea0473/img/favicon_32x32.png" alt="YT"> YouTube
    </a>
</div>

<canvas id="gameCanvas"></canvas>

const scoreElement = document.getElementById('score');
const btnContainer = document.getElementById('btn-container');
const postBtn = document.getElementById('post-btn');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let frameCount = 0;
